name: Weekly Channel Update

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  channel-update:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: cmd
        run: |
          py -3.12 -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        run: |
          py -3.12 -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Generate channel branding
        shell: powershell
        run: |
          py -3.12 -c "
          from modules.channel_branding_generator import generate_all_branding
          result = generate_all_branding()
          print(f'Profile: {result[\"profile_picture\"]}')
          print(f'Banner: {result[\"banner\"]}')
          "

      - name: Update channel description and branding
        shell: powershell
        run: |
          py -3.12 -c "
          from modules.channel_manager import check_and_update_channel
          result = check_and_update_channel()
          print(f'Channel update: {result}')
          print(f'Description updated: {result[\"description_updated\"]}')
          print(f'Branding uploaded: {result[\"branding_uploaded\"]}')
          "
