name: Weekly Channel Update

on:
  workflow_dispatch:

jobs:
  channel-update:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        shell: cmd
        run: |
          setx PATH "%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          set "PATH=%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          python --version

      - name: Install Python dependencies
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp opencv-python-headless

      - name: Check Python syntax
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Generate channel branding
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts;C:\Users\A\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin"
          python -c "
          from modules.channel_branding_generator import generate_all_branding
          result = generate_all_branding()
          print(f'Profile: {result[\"profile_picture\"]}')
          print(f'Banner: {result[\"banner\"]}')
          "

      - name: Update channel description and branding
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts;C:\Users\A\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin"
          python -c "
          from modules.channel_manager import check_and_update_channel
          result = check_and_update_channel()
          print(f'Channel update: {result}')
          print(f'Description updated: {result[\"description_updated\"]}')
          print(f'Branding uploaded: {result[\"branding_uploaded\"]}')
          "
