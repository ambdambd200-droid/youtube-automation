name: Weekly Channel Update

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  channel-update:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: cmd
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: powershell
        run: |
          C:\Users\A\AppData\Local\Programs\Python\Python312\python.exe -m compileall . -q 2>&1

      - name: Create assets directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets\downloads, assets\clips, assets\thumbnails\variants, assets\logs, assets\channel_art | Out-Null

      - name: Generate channel branding
        shell: powershell
        run: |
          C:\Users\A\AppData\Local\Programs\Python\Python312\python.exe -c "
          from modules.channel_branding_generator import generate_all_branding
          result = generate_all_branding()
          print(f'Profile: {result[\"profile_picture\"]}')
          print(f'Banner: {result[\"banner\"]}')
          "

      - name: Update channel description and branding
        shell: powershell
        run: |
          C:\Users\A\AppData\Local\Programs\Python\Python312\python.exe -c "
          from modules.channel_manager import check_and_update_channel
          result = check_and_update_channel()
          print(f'Channel update: {result}')
          print(f'Description updated: {result[\"description_updated\"]}')
          print(f'Branding uploaded: {result[\"branding_uploaded\"]}')
          "
