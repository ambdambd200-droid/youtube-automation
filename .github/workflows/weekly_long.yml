name: Weekly Long-Form Video

on:
  schedule:
    # Runs every Saturday at 13:00 UTC (4PM Mecca time)
    - cron: "0 13 * * 6"
  workflow_dispatch:  # Allow manual trigger
    inputs:
      topic:
        description: "Video topic (leave empty for AI to choose)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet edge-tts pillow requests moviepy google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv imageio-ffmpeg

      - name: Install Arabic fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-core fonts-noto-extra

      - name: Debug secrets
        run: |
          echo "CLAUDE_API_KEY set: ${{ secrets.CLAUDE_API_KEY != '' }}"
          echo "YOUTUBE_CLIENT_ID set: ${{ secrets.YOUTUBE_CLIENT_ID != '' }}"
          echo "YOUTUBE_CLIENT_SECRET set: ${{ secrets.YOUTUBE_CLIENT_SECRET != '' }}"
          echo "YOUTUBE_REFRESH_TOKEN set: ${{ secrets.YOUTUBE_REFRESH_TOKEN != '' }}"
          echo "YOUTUBE_TOKEN_B64 set: ${{ secrets.YOUTUBE_TOKEN_B64 != '' }}"

      - name: Create .env file
        run: |
          echo "N8N_API_KEY=dummy" > .env
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> .env
          echo "CLAUDE_API_URL=https://openrouter.ai/api/v1/chat/completions" >> .env
          echo "CLAUDE_MODEL=anthropic/claude-3-haiku" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}" >> .env
          echo "OUTPUT_DIR=./assets" >> .env
          echo "AUDIO_BACKGROUND=assets/audio/background.mp3" >> .env

      - name: Decode YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 --decode > youtube_token.pickle

      - name: Create assets directories
        run: |
          mkdir -p assets/audio assets/images assets/videos assets/thumbnails

      - name: Ensure background audio exists
        run: |
          if [ ! -f assets/audio/background.mp3 ]; then
            echo "Background audio missing, generating silent fallback..."
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 18 -q:a 9 assets/audio/background.mp3 -y
          fi

      - name: Run weekly long-form pipeline
        run: python run_pipeline.py --type long --topic "${{ github.event.inputs.topic || '' }}"

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-artifacts
          path: |
            assets/audio/
            assets/images/
            assets/videos/
            assets/thumbnails/
