name: VARY — Daily Shorts (×2)

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (football, movie, series, or auto)'
        required: false
        default: ''
      query:
        description: 'Custom search query'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy local credentials
        shell: cmd
        run: |
          if exist "C:\Users\A\Desktop\Movies\.env" copy "C:\Users\A\Desktop\Movies\.env" .env

      - name: Install Python dependencies
        shell: cmd
        run: |
          py -3.12 -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        run: |
          py -3.12 -m compileall . -q

      - name: Debug YouTube env vars
        shell: cmd
        run: |
          echo === DEBUG: YouTube Env Vars ===
          if "%YOUTUBE_CLIENT_ID%"=="" (echo CLIENT_ID: MISSING) else (echo CLIENT_ID: SET)
          if "%YOUTUBE_CLIENT_SECRET%"=="" (echo CLIENT_SECRET: MISSING) else (echo CLIENT_SECRET: SET)
          if "%YOUTUBE_REFRESH_TOKEN%"=="" (echo REFRESH_TOKEN: MISSING) else (echo REFRESH_TOKEN: SET)
          if "%YOUTUBE_TOKEN_B64%"=="" (echo TOKEN_B64: MISSING) else (echo TOKEN_B64: SET)
          echo === END DEBUG ===

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          set MAX_RETRIES=1
          set RETRY_DELAY=60
          set ATTEMPT=0
          :retry_loop
          if !ATTEMPT! gtr !MAX_RETRIES! exit /b 1
          if !ATTEMPT! gtr 0 (
              echo Retry attempt !ATTEMPT!/!MAX_RETRIES! after !RETRY_DELAY! seconds...
              timeout /t !RETRY_DELAY! /nobreak > nul
          )
          if not "${{ github.event.inputs.type }}"=="" (
              py -3.12 run_pipeline.py --type ${{ github.event.inputs.type }}
          ) else if not "${{ github.event.inputs.query }}"=="" (
              py -3.12 run_pipeline.py --query "${{ github.event.inputs.query }}"
          ) else (
              py -3.12 run_pipeline.py
          )
          if !ERRORLEVEL! equ 0 goto :retry_end
          echo Pipeline failed ^(exit code: !ERRORLEVEL!^) on attempt !ATTEMPT!
          set /a ATTEMPT+=1
          goto :retry_loop
          :retry_end
