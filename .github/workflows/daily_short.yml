name: VARY — Daily Shorts (×3)

on:
  schedule:
    # Saturday (6) — 11:00, 14:00, 19:00 UTC
    - cron: "0 11 * * 6"
    - cron: "0 14 * * 6"
    - cron: "0 19 * * 6"
    # Sunday (0) — 10:00, 13:00, 18:00 UTC
    - cron: "0 10 * * 0"
    - cron: "0 13 * * 0"
    - cron: "0 18 * * 0"
    # Monday (1) — 12:00, 15:00, 19:00 UTC
    - cron: "0 12 * * 1"
    - cron: "0 15 * * 1"
    - cron: "0 19 * * 1"
    # Tuesday (2) — 12:00, 16:00, 20:00 UTC
    - cron: "0 12 * * 2"
    - cron: "0 16 * * 2"
    - cron: "0 20 * * 2"
    # Wednesday (3) — 12:00, 14:00, 18:00 UTC
    - cron: "0 12 * * 3"
    - cron: "0 14 * * 3"
    - cron: "0 18 * * 3"
    # Thursday (4) — 12:00, 15:00, 20:00 UTC
    - cron: "0 12 * * 4"
    - cron: "0 15 * * 4"
    - cron: "0 20 * * 4"
    # Friday (5) — 10:00, 13:00, 21:00 UTC
    - cron: "0 10 * * 5"
    - cron: "0 13 * * 5"
    - cron: "0 21 * * 5"
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (movie, worldcup, or auto)'
        required: false
        default: ''
      query:
        description: 'Custom search query'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    services:
      pot-provider:
        image: brainicism/bgutil-ytdlp-pot-provider
        ports:
          - 4416:4416
    # Auto-retry on failure (watchdog: 1 automatic retry)
    strategy:
      max-parallel: 1  # ensure sequential runs (avoid download conflicts)
    continue-on-error: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp bgutil-ytdlp-pot-provider

      - name: Check Python syntax
        run: |
          python -m compileall . -q

      - name: Debug secrets
        run: |
          echo "YOUTUBE_CLIENT_ID set: ${{ secrets.YOUTUBE_CLIENT_ID != '' }}"
          echo "YOUTUBE_CLIENT_SECRET set: ${{ secrets.YOUTUBE_CLIENT_SECRET != '' }}"
          echo "YOUTUBE_REFRESH_TOKEN set: ${{ secrets.YOUTUBE_REFRESH_TOKEN != '' }}"
          echo "YOUTUBE_TOKEN_B64 set: ${{ secrets.YOUTUBE_TOKEN_B64 != '' }}"
          echo "YT_COOKIES_B64 set: ${{ secrets.YT_COOKIES_B64 != '' }}"

      - name: Create .env file
        run: |
          echo "N8N_API_KEY=dummy" > .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}" >> .env
          echo "OUTPUT_DIR=./assets" >> .env
          echo "YT_COOKIES_FILE=./cookies.txt" >> .env

      - name: Decode YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 --decode > youtube_token.pickle

      - name: Decode YouTube cookies (for yt-dlp bot bypass)
        run: |
          echo "${{ secrets.YT_COOKIES_B64 }}" | base64 --decode > cookies.txt 2>/dev/null || echo "  [SKIP] YT_COOKIES_B64 not set"

      - name: Create assets directories
        run: |
          mkdir -p assets/downloads assets/clips assets/thumbnails/variants assets/logs assets/channel_art

      - name: Verify bgutil POT provider is running
        run: |
          echo "Checking bgutil POT provider at http://127.0.0.1:4416..."
          curl -s -o /dev/null -w "HTTP %{http_code}" http://127.0.0.1:4416 2>&1 || echo "  [WARN] bgutil server not reachable (may still be starting)"
          echo ""
          echo "Checking yt-dlp registered PO token providers..."
          yt-dlp --version 2>&1
          python -c "import bgutil_ytdlp_pot_provider; print('bgutil plugin:', bgutil_ytdlp_pot_provider.__version__)" 2>&1 || echo "  [WARN] bgutil plugin check failed"

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        run: |
          MAX_RETRIES=1
          RETRY_DELAY=60  # seconds
          for attempt in $(seq 0 $MAX_RETRIES); do
            if [ $attempt -gt 0 ]; then
              echo "Retry attempt $attempt/$MAX_RETRIES after $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
            python run_pipeline.py \
              ${{ github.event.inputs.type && format('--type {0}', github.event.inputs.type) || '' }} \
              ${{ github.event.inputs.query && format('--query \"{0}\"', github.event.inputs.query) || '' }} \
            && break
            EXIT_CODE=$?
            echo "Pipeline failed (exit code: $EXIT_CODE) on attempt $attempt"
            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "All retries exhausted. Reporting failure."
              exit $EXIT_CODE
            fi
          done

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-artifacts-${{ github.run_attempt }}
          path: |
            assets/downloads/
            assets/clips/
            assets/thumbnails/
            assets/logs/
