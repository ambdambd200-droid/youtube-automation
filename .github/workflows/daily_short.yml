name: VARY — Daily Shorts (×3)

on:
  schedule:
    - cron: "0 11 * * 6"
    - cron: "0 14 * * 6"
    - cron: "0 19 * * 6"
    - cron: "0 10 * * 0"
    - cron: "0 13 * * 0"
    - cron: "0 18 * * 0"
    - cron: "0 12 * * 1"
    - cron: "0 15 * * 1"
    - cron: "0 19 * * 1"
    - cron: "0 12 * * 2"
    - cron: "0 16 * * 2"
    - cron: "0 20 * * 2"
    - cron: "0 12 * * 3"
    - cron: "0 14 * * 3"
    - cron: "0 18 * * 3"
    - cron: "0 12 * * 4"
    - cron: "0 15 * * 4"
    - cron: "0 20 * * 4"
    - cron: "0 10 * * 5"
    - cron: "0 13 * * 5"
    - cron: "0 21 * * 5"
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (movie, worldcup, or auto)'
        required: false
        default: ''
      query:
        description: 'Custom search query'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: powershell
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp 2>&1 | Select-Object -Last 5

      - name: Check Python syntax
        shell: powershell
        run: |
          python -m compileall . -q 2>&1

      - name: Create .env file
        shell: powershell
        run: |
          @"
          N8N_API_KEY=dummy
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OUTPUT_DIR=./assets
          YT_COOKIES_FILE=./cookies.txt
          "@ | Out-File -FilePath .env -Encoding ascii -NoNewline

      - name: Decode YouTube token
        shell: powershell
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.YOUTUBE_TOKEN_B64 }}")
          [System.IO.File]::WriteAllBytes("youtube_token.pickle", $bytes)
          Write-Host "  [OK] Token decoded: $($bytes.Length) bytes"

      - name: Decode YouTube cookies
        shell: powershell
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.YT_COOKIES_B64 }}")
          $text = [System.Text.Encoding]::ASCII.GetString($bytes) -replace "`r", ""
          [System.IO.File]::WriteAllText("cookies.txt", $text, [System.Text.Encoding]::ASCII)
          $lines = (Get-Content cookies.txt | Measure-Object -Line).Lines
          $size = (Get-Item cookies.txt).Length
          Write-Host "  [OK] Cookies decoded: $lines lines, $size bytes"

      - name: Create assets directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets\downloads, assets\clips, assets\thumbnails\variants, assets\logs, assets\channel_art | Out-Null

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        shell: powershell
        run: |
          $MAX_RETRIES = 1
          $RETRY_DELAY = 60
          ${{ github.event.inputs.type && format('$env:PIPELINE_TYPE = "{0}"', github.event.inputs.type) || '' }}
          ${{ github.event.inputs.query && format('$env:PIPELINE_QUERY = "{0}"', github.event.inputs.query) || '' }}
          0..$MAX_RETRIES | ForEach-Object {
            $attempt = $_
            if ($attempt -gt 0) {
              Write-Host "Retry attempt $attempt/$MAX_RETRIES after $RETRY_DELAY seconds..."
              Start-Sleep -Seconds $RETRY_DELAY
            }
            & python run_pipeline.py $env:PIPELINE_TYPE $env:PIPELINE_QUERY
            if ($LASTEXITCODE -eq 0) {
              break
            }
            Write-Host "Pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
            if ($attempt -eq $MAX_RETRIES) {
              Write-Host "All retries exhausted. Reporting failure."
              exit $LASTEXITCODE
            }
          }
