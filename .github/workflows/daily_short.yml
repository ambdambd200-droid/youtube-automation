name: Daily Short Video

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq espeak-ng libsndfile1-dev ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install --quiet edge-tts pillow requests moviepy google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv imageio-ffmpeg

      - name: Install Coqui TTS (voice cloning)
        run: |
          pip install --quiet TTS

      - name: Debug secrets
        run: |
          echo "GROQ_API_KEY set: ${{ secrets.GROQ_API_KEY != '' }}"
          echo "YOUTUBE_CLIENT_ID set: ${{ secrets.YOUTUBE_CLIENT_ID != '' }}"
          echo "YOUTUBE_CLIENT_SECRET set: ${{ secrets.YOUTUBE_CLIENT_SECRET != '' }}"
          echo "YOUTUBE_REFRESH_TOKEN set: ${{ secrets.YOUTUBE_REFRESH_TOKEN != '' }}"
          echo "YOUTUBE_TOKEN_B64 set: ${{ secrets.YOUTUBE_TOKEN_B64 != '' }}"

      - name: Create .env file
        run: |
          echo "N8N_API_KEY=dummy" > .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}" >> .env
          echo "OUTPUT_DIR=./assets" >> .env
          echo "AUDIO_BACKGROUND=assets/audio/background.mp3" >> .env

      - name: Decode YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 --decode > youtube_token.pickle

      - name: Create assets directories
        run: |
          mkdir -p assets/audio assets/images assets/videos assets/thumbnails

      - name: Ensure background audio exists
        run: |
          if [ ! -f assets/audio/background.mp3 ]; then
            echo "Generating background audio..."
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 18 -q:a 9 assets/audio/background.mp3 -y
          fi

      - name: Run daily short pipeline
        run: python run_pipeline.py --type short

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-artifacts
          path: |
            assets/audio/
            assets/images/
            assets/videos/
            assets/thumbnails/
