name: VARY — Daily Shorts (×3)

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC = 09:00 SA
    - cron: "0 12 * * *"   # 12:00 UTC = 15:00 SA
    - cron: "0 16 * * *"   # 16:00 UTC = 19:00 SA
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (football, movie, series, or auto)'
        required: false
        default: ''
      query:
        description: 'Custom search query'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp 2>&1

      - name: Check Python syntax
        shell: powershell
        run: |
          python -m compileall . -q 2>&1

      - name: Create assets directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets\downloads, assets\clips, assets\thumbnails\variants, assets\logs, assets\channel_art | Out-Null

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        shell: powershell
        run: |
          $maxRetries = 1
          $retryDelay = 60
          $pipelineType = "${{ github.event.inputs.type }}"
          $pipelineQuery = "${{ github.event.inputs.query }}"
          for ($attempt = 0; $attempt -le $maxRetries; $attempt++) {
            if ($attempt -gt 0) {
              Write-Host "Retry attempt $attempt/$maxRetries after $retryDelay seconds..."
              Start-Sleep -Seconds $retryDelay
            }
            if ($pipelineType -ne '') {
              python run_pipeline.py --type $pipelineType
            } elseif ($pipelineQuery -ne '') {
              python run_pipeline.py --query "$pipelineQuery"
            } else {
              python run_pipeline.py
            }
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
            if ($attempt -eq $maxRetries) {
              Write-Host "All retries exhausted. Reporting failure."
              exit 1
            }
          }
