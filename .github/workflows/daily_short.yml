name: VARY — Daily Shorts (×2)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (e.g., "Messi goal 2026", "Argentina vs Egypt full match") — leave empty for auto'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy local credentials
        shell: cmd
        run: |
          if exist "C:\Users\A\Desktop\Movies\.env" copy /Y "C:\Users\A\Desktop\Movies\.env" .env

      - name: Install Python dependencies
        shell: cmd
        run: |
          py -3.12 -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        run: |
          py -3.12 -m compileall . -q


      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        shell: powershell
        run: |
          $maxRetries = 1
          $retryDelay = 60
          $attempt = 0
          do {
              if ($attempt -gt $maxRetries) { exit 1 }
              if ($attempt -gt 0) {
                  Write-Host "Retry attempt $attempt/$maxRetries after $retryDelay seconds..."
                  Start-Sleep -Seconds $retryDelay
              }
              if ("${{ github.event.inputs.query }}" -ne "") {
                  py -3.12 run_pipeline.py --query "${{ github.event.inputs.query }}"
              } else {
                  py -3.12 run_pipeline.py
              }
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "Pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
              $attempt++
          } while ($true)
