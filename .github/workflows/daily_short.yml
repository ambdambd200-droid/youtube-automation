name: VARY — Daily Shorts (×3)

on:
  schedule:
    - cron: "0 8 * * *"    # 08:00 UTC daily
    - cron: "0 14 * * *"   # 14:00 UTC daily
    - cron: "0 19 * * *"   # 19:00 UTC daily
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (football, movie, series, or auto)'
        required: false
        default: ''
      query:
        description: 'Custom search query'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        run: |
          python -m compileall . -q 2>&1

      - name: Decode YouTube cookies
        env:
          YT_COOKIES_B64: ${{ secrets.YT_COOKIES_B64 }}
        run: |
          python3 -c "
import base64, sys, os
data = base64.b64decode(os.environ['YT_COOKIES_B64'])
with open('cookies.txt', 'wb') as f:
    f.write(data)
print(f'  [OK] Cookies decoded: {len(data)} bytes')
"

      - name: Create .env file
        run: |
          cat <<EOF > .env
          N8N_API_KEY=dummy
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_COOKIES_FILE=$(pwd)/cookies.txt
          OUTPUT_DIR=./assets
          EOF
          echo "  [OK] .env created"

      - name: Decode YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          echo "  [OK] Token decoded: $(wc -c < youtube_token.pickle) bytes"

      - name: Create assets directories
        run: |
          mkdir -p assets/downloads assets/clips assets/thumbnails/variants assets/logs assets/channel_art

      - name: Run clip pipeline (with auto-retry on crash)
        id: pipeline
        run: |
          MAX_RETRIES=1
          RETRY_DELAY=60

          PIPELINE_TYPE="${{ github.event.inputs.type }}"
          PIPELINE_QUERY="${{ github.event.inputs.query }}"

          for attempt in $(seq 0 $MAX_RETRIES); do
            if [ "$attempt" -gt 0 ]; then
              echo "Retry attempt $attempt/$MAX_RETRIES after $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
            python run_pipeline.py $PIPELINE_TYPE $PIPELINE_QUERY
            if [ $? -eq 0 ]; then
              break
            fi
            echo "Pipeline failed (exit code: $?) on attempt $attempt"
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "All retries exhausted. Reporting failure."
              exit 1
            fi
          done
