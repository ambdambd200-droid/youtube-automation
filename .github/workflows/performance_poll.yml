name: VARY — Performance Poll

on:
  workflow_dispatch:

jobs:
  poll-performance:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        shell: cmd
        run: |
          setx PATH "%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          set "PATH=%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          python --version

      - name: Install Python dependencies
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp opencv-python-headless

      - name: Check Python syntax
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\logs mkdir assets\logs

      - name: Poll performance data for all uploaded videos
        id: poll
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts;C:\Users\A\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin"
          python -c "
          from modules.performance_tracker import poll_all_videos, calculate_performance_trends
          results = poll_all_videos()
          print(f'Polled {len(results)} videos')
          trends = calculate_performance_trends()
          if trends:
              print(f'Avg real performance: {trends[\"average_performance_score\"]}')
              print(f'Videos tracked: {trends[\"videos_tracked\"]}')
              print(f'Like ratio: {trends[\"average_like_ratio\"]}%')
          "

      - name: Run evolution cycle with real performance data
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts;C:\Users\A\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin"
          python -c "
          from modules.evolution_engine import evolve
          result = evolve()
          print(f'Evolved: {result[\"evolved\"]}, gen: {result[\"generation\"]}')
          print(f'Mutations: {result[\"mutations\"]}')
          "
