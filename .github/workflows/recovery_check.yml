name: VARY — Pipeline Recovery Check

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Recovery mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - check
          - force
      pipeline:
        description: 'Pipeline type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - daily
          - weekly

jobs:
  recover:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        shell: cmd
        run: |
          setx PATH "%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          set "PATH=%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          python --version

      - name: Install Python dependencies
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Report pipeline state
        id: check_state
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          Write-Host "### Pipeline State Report"
          python -m modules.pipeline_watchdog --status 2>&1
          python -m modules.pipeline_watchdog --missed 2>&1

      - name: Prune old pipeline state entries
        id: prune_state
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          $output = python -m modules.pipeline_watchdog --prune 2>&1
          Write-Host $output

      - name: Run recovery
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          $mode = "${{ github.event.inputs.mode }}"
          $filter = ""
          if ("${{ github.event.inputs.pipeline }}" -eq "daily") { $filter = "--daily" }
          if ("${{ github.event.inputs.pipeline }}" -eq "weekly") { $filter = "--weekly" }
          switch ($mode) {
            "check" { python run_recovery.py --check $filter }
            "force" { python run_recovery.py --force $filter }
            default { python run_recovery.py $filter }
          }
