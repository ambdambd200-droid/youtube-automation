name: VARY — Pipeline Recovery Check

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Recovery mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - check
          - force
      pipeline:
        description: 'Pipeline type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - daily
          - weekly

jobs:
  recover:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Add Python 3.12 to PATH
        shell: cmd
        run: |
          echo C:\Users\A\AppData\Local\Programs\Python\Python312\ >> %GITHUB_PATH%
          echo C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts\ >> %GITHUB_PATH%

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp 2>&1

      - name: Check Python syntax
        shell: powershell
        run: |
          python -m compileall . -q 2>&1

      - name: Create assets directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets\downloads, assets\clips, assets\thumbnails\variants, assets\logs, assets\channel_art | Out-Null

      - name: Report pipeline state
        id: check_state
        shell: powershell
        run: |
          Write-Host "### Pipeline State Report"
          python -m modules.pipeline_watchdog --status 2>&1
          python -m modules.pipeline_watchdog --missed 2>&1

      - name: Prune old pipeline state entries
        id: prune_state
        shell: powershell
        run: |
          $output = python -m modules.pipeline_watchdog --prune 2>&1
          Write-Host $output

      - name: Run recovery
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "schedule") { $mode = "auto" } else { $mode = "${{ github.event.inputs.mode }}" }
          $filter = ""
          if ("${{ github.event.inputs.pipeline }}" -eq "daily") { $filter = "--daily" }
          if ("${{ github.event.inputs.pipeline }}" -eq "weekly") { $filter = "--weekly" }
          switch ($mode) {
            "check" { python run_recovery.py --check $filter }
            "force" { python run_recovery.py --force $filter }
            default { python run_recovery.py $filter }
          }
