name: VARY — Pipeline Recovery Check

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Recovery mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - check
          - force
      pipeline:
        description: 'Pipeline type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - daily
          - weekly

jobs:
  recover:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: cmd
        run: |
          py -3.12 -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        run: |
          py -3.12 -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Report pipeline state
        id: check_state
        shell: powershell
        run: |
          Write-Host "### Pipeline State Report"
          py -3.12 -m modules.pipeline_watchdog --status 2>&1
          py -3.12 -m modules.pipeline_watchdog --missed 2>&1

      - name: Prune old pipeline state entries
        id: prune_state
        shell: powershell
        run: |
          $output = py -3.12 -m modules.pipeline_watchdog --prune 2>&1
          Write-Host $output

      - name: Run recovery
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "schedule") { $mode = "auto" } else { $mode = "${{ github.event.inputs.mode }}" }
          $filter = ""
          if ("${{ github.event.inputs.pipeline }}" -eq "daily") { $filter = "--daily" }
          if ("${{ github.event.inputs.pipeline }}" -eq "weekly") { $filter = "--weekly" }
          switch ($mode) {
            "check" { py -3.12 run_recovery.py --check $filter }
            "force" { py -3.12 run_recovery.py --force $filter }
            default { py -3.12 run_recovery.py $filter }
          }
