name: VARY — Weekly Video (Saturday)

on:
  schedule:
    - cron: "0 12 * * 6"    # Saturday 12:00 UTC = 15:00 SA
  workflow_dispatch:
    inputs:
      query:
        description: 'Custom search query for weekly video source'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell
        run: |
          pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp 2>&1

      - name: Check Python syntax
        shell: powershell
        run: |
          python -m compileall . -q 2>&1

      - name: Create assets directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path assets\downloads, assets\clips, assets\thumbnails\variants, assets\logs, assets\channel_art | Out-Null

      - name: Run weekly video pipeline
        id: weekly
        shell: powershell
        run: |
          $maxRetries = 1
          $retryDelay = 60
          $query = "${{ github.event.inputs.query }}"
          for ($attempt = 0; $attempt -le $maxRetries; $attempt++) {
            if ($attempt -gt 0) {
              Write-Host "Retry attempt $attempt/$maxRetries after $retryDelay seconds..."
              Start-Sleep -Seconds $retryDelay
            }
            if ($query -ne '') {
              python run_weekly_pipeline.py --query "$query"
            } else {
              python run_weekly_pipeline.py
            }
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Weekly pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
            if ($attempt -eq $maxRetries) {
              Write-Host "All retries exhausted. Reporting failure."
              exit $LASTEXITCODE
            }
          }
