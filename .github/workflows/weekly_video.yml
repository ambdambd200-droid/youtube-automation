name: VARY — Weekly Video (Saturday)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Custom search query for weekly video source'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: cmd
        run: |
          py -3.12 -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp

      - name: Check Python syntax
        shell: cmd
        run: |
          py -3.12 -m compileall . -q

      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Run weekly video pipeline
        id: weekly
        shell: powershell
        run: |
          $maxRetries = 1
          $retryDelay = 60
          $query = "${{ github.event.inputs.query }}"
          for ($attempt = 0; $attempt -le $maxRetries; $attempt++) {
            if ($attempt -gt 0) {
              Write-Host "Retry attempt $attempt/$maxRetries after $retryDelay seconds..."
              Start-Sleep -Seconds $retryDelay
            }
            if ($query -ne '') {
              py -3.12 run_weekly_pipeline.py --query "$query"
            } else {
              py -3.12 run_weekly_pipeline.py
            }
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Weekly pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
            if ($attempt -eq $maxRetries) {
              Write-Host "All retries exhausted. Reporting failure."
              exit $LASTEXITCODE
            }
          }
