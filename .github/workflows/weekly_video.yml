name: VARY — Weekly Video (Saturday)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Custom search query for weekly video source'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy local credentials
        shell: cmd
        run: |
          if exist "C:\Users\A\Desktop\Movies\.env" copy /Y "C:\Users\A\Desktop\Movies\.env" .env

      - name: Setup Python
        shell: cmd
        run: |
          setx PATH "%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          set "PATH=%PATH%;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          python --version

      - name: Install Python dependencies
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m pip install --quiet pillow requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv yt-dlp edge-tts

      - name: Check Python syntax
        shell: cmd
        env:
          PATH: C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts
        run: |
          python -m compileall . -q


      - name: Create assets directories
        shell: cmd
        run: |
          if not exist assets\downloads mkdir assets\downloads
          if not exist assets\clips mkdir assets\clips
          if not exist assets\thumbnails\variants mkdir assets\thumbnails\variants
          if not exist assets\logs mkdir assets\logs
          if not exist assets\channel_art mkdir assets\channel_art

      - name: Run weekly video pipeline
        id: weekly
        shell: powershell
        run: |
          $env:PATH += ";C:\Users\A\AppData\Local\Programs\Python\Python312;C:\Users\A\AppData\Local\Programs\Python\Python312\Scripts"
          $maxRetries = 1
          $retryDelay = 60
          $attempt = 0
          $query = "${{ github.event.inputs.query }}"
          do {
              if ($attempt -gt $maxRetries) { exit 1 }
              if ($attempt -gt 0) {
                  Write-Host "Retry attempt $attempt/$maxRetries after $retryDelay seconds..."
                  Start-Sleep -Seconds $retryDelay
              }
              if ($query -ne "") {
                  python run_weekly_pipeline.py --query "$query"
              } else {
                  python run_weekly_pipeline.py
              }
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "Pipeline failed (exit code: $LASTEXITCODE) on attempt $attempt"
              $attempt++
          } while ($true)
